        let currentQ = 0;
        let answers = new Array(quizData.length).fill(null);

        function loadQuestion() {
            const q = quizData[currentQ];
            document.getElementById('progress').innerText = `السؤال ${currentQ + 1} من ${quizData.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            document.getElementById('prev-btn').disabled = currentQ === 0;
            document.getElementById('next-btn').innerText = currentQ === quizData.length - 1 ? 'إنهاء الاختبار' : 'التالي';

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.classList.add('hidden');

            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                let classes = 'w-full text-right p-4 rounded-xl border transition ';
                
                if (answers[currentQ] !== null) {
                    if (idx === q.correct) classes += 'bg-green-500 text-white border-green-500 ';
                    else if (idx === answers[currentQ]) classes += 'bg-red-500 text-white border-red-500 ';
                    else classes += 'border-gray-200 opacity-50 ';
                } else {
                    classes += 'border-gray-200 hover:bg-blue-50 ';
                }
                
                btn.className = classes;
                btn.innerText = opt;
                btn.onclick = () => { 
                    if (answers[currentQ] === null) { 
                        answers[currentQ] = idx; 
                        if (idx !== q.correct) {
                            feedbackBox.innerText = `للأسف، الإجابة غير صحيحة. الإجابة الصحيحة هي: ${q.a[q.correct]}`;
                            feedbackBox.className = 'mt-4 p-4 rounded-lg bg-red-100 text-red-700 font-bold';
                        } else {
                            feedbackBox.innerText = 'أحسنت! إجابة صحيحة.';
                            feedbackBox.className = 'mt-4 p-4 rounded-lg bg-green-100 text-green-700 font-bold';
                        }
                        feedbackBox.classList.remove('hidden');
                        loadQuestion(); 
                    } 
                };
                container.appendChild(btn);
            });
        }

        function navigate(dir) {
            currentQ += dir;
            if (currentQ >= quizData.length) showResult();
            else loadQuestion();
        }

        function showResult() {
            let score = answers.filter((ans, idx) => ans === quizData[idx].correct).length;
            document.getElementById('question-box').classList.add('hidden');
            const res = document.getElementById('result-box');
            res.classList.remove('hidden');
            document.getElementById('score-text').innerText = `لقد حصلت على ${score} من ${quizData.length}`;
        }

        loadQuestion();
    </script>
